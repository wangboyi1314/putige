name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then echo "::error::未配置 CLOUDFLARE_API_TOKEN"; missing=1; fi
          if [ -z "${CF_ACCOUNT}" ]; then echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID"; missing=1; fi
          if [ -z "${DEEPSEEK_KEY}" ]; then echo "::error::未配置 DEEPSEEK_API_KEY"; missing=1; fi
          [ "$missing" -eq 0 ]

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEXT_PUBLIC_BASE_URL: https://putige-eh2.pages.dev
          PAYMENT_MODE: xunhu

      - name: Package Pages bundle with Functions
        run: |
          bash scripts/build-pages-static.sh
          echo "${{ github.sha }}" > out/build-id.txt

      - name: Compile Pages Functions
        run: npx wrangler pages functions build out --compatibility-flag nodejs_compat

      - name: Ensure orders KV namespace
        id: orders_kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          KV_ID=$(npx wrangler kv namespace list --json | jq -r '.[] | select(.title=="putige-orders") | .id' | head -1)
          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            KV_ID=$(npx wrangler kv namespace create putige-orders --json | jq -r '.id')
            echo "Created KV namespace putige-orders"
          else
            echo "Using existing KV namespace putige-orders"
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"

      - name: Configure Pages secrets
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XUNHU_APP_SECRET: ${{ secrets.XUNHU_APP_SECRET }}
        run: |
          echo "$DEEPSEEK_API_KEY" | npx wrangler pages secret put DEEPSEEK_API_KEY --project-name putige
          if [ -n "${XUNHU_APP_SECRET}" ]; then
            echo "$XUNHU_APP_SECRET" | npx wrangler pages secret put XUNHU_APP_SECRET --project-name putige
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler pages deploy out \
            --project-name=putige \
            --branch=main \
            --commit-hash="${{ github.sha }}" \
            --kv=ORDERS=${{ steps.orders_kv.outputs.kv_id }}

      - name: Verify payment API
        continue-on-error: true
        run: |
          set -euo pipefail
          BASE="https://putige-eh2.pages.dev"
          for i in 1 2 3 4 5 6 7 8; do
            HEALTH=$(curl -sS "$BASE/api/health" || echo "{}")
            echo "health attempt $i => $HEALTH"
            BODY=$(curl -sS -X POST "$BASE/api/payment/create" \
              -H "Content-Type: application/json" \
              -d '{"productId":"qian_premium","payChannel":"wechat"}' || echo "{}")
            echo "create attempt $i => $BODY"
            ORDER_ID=$(echo "$BODY" | jq -r '.orderId // empty')
            if echo "$BODY" | grep -q '"xunhuMode":true' && [ -n "$ORDER_ID" ]; then
              STATUS=$(curl -sS "$BASE/api/payment/status?orderId=$ORDER_ID" || echo "{}")
              echo "status => $STATUS"
              if echo "$STATUS" | grep -q '"status":"pending"'; then
                echo "虎皮椒支付与订单 KV 均已上线"
                exit 0
              fi
              echo "::warning::支付下单成功但订单状态未持久化，请检查 KV 绑定 ORDERS"
            fi
            sleep 15
          done
          echo "::error::支付 API 未完全就绪，请检查 Cloudflare 环境变量与 KV"
          exit 1

      - name: Deployment info
        if: always() && !cancelled()
        run: |
          echo "主站: https://putige-eh2.pages.dev"
          echo "部署: ${{ steps.deploy.outcome }}"
