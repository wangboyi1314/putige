name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_ACCOUNT_ID（填 70ebb96ad3d3a7c5e308a26ac50862dc）"
            missing=1
          fi
          if [ -z "${DEEPSEEK_KEY}" ]; then
            echo "::error::未配置 GitHub Secret: DEEPSEEK_API_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Secrets 已配置（Token 长度 ${#CF_TOKEN} 字符）"

      - name: Install dependencies
        run: npm ci

      - name: Verify Node.js version
        run: |
          node -v
          major=$(node -p "process.versions.node.split('.')[0]")
          if [ "$major" -lt 22 ]; then
            echo "::error::Wrangler 需要 Node.js 22+，当前为 $(node -v)。请确认 .node-version 为 22。"
            exit 1
          fi

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
          NEXT_PUBLIC_BASE_URL: https://putige.pages.dev
          PAYMENT_MODE: demo

      - name: Diagnose Cloudflare project conflict
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          echo "=== Pages 项目 putige ==="
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-project.json
          echo ""
          echo "=== Workers 脚本（检查是否仍有 putige 占用名称）==="
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/workers-scripts.json
          if grep -q '"id":"putige"' /tmp/workers-scripts.json 2>/dev/null; then
            echo "::warning::仍存在 Worker 脚本 putige，可能与 Pages 项目 putige 冲突，导致 putige.pages.dev 404"
            echo "::warning::请在 Cloudflare 控制台删除旧 Worker putige，仅保留 Pages putige + Worker putige-worker"
          fi

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if ! npx wrangler pages project list 2>/dev/null | grep -qw putige; then
            npx wrangler pages project create putige \
              --production-branch main \
              --compatibility-date 2026-06-25 \
              --compatibility-flag nodejs_compat_v2 \
              --compatibility-flag global_fetch_strictly_public
            echo "已创建 Pages 项目 putige"
          else
            echo "Pages 项目 putige 已存在"
          fi

      - name: Configure Pages secrets (before deploy)
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler pages secret put DEEPSEEK_API_KEY --project-name putige
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Prepare Pages deploy bundle
        run: bash scripts/prepare-pages-bundle.sh

      - name: Deploy to Cloudflare Pages (putige.pages.dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next/assets --project-name=putige
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"

      - name: Verify Pages deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige/deployments" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-deployments.json
          echo ""
          echo "=== HTTP 检查 ==="
          curl -sI https://putige.pages.dev | head -10 | tee /tmp/pages-http.txt
          if grep -q "404" /tmp/pages-http.txt; then
            echo "::error::putige.pages.dev 仍返回 404"
            echo "::error::请在 Cloudflare 控制台：1) 删除旧 Worker 项目 putige  2) 确认 Pages 项目 putige 存在  3) 暂停 Pages/Workers 的 Git 自动构建  4) 重新 Run workflow"
            echo "::error::详见仓库 CLOUDFLARE_PAGES_FIX.md"
            exit 1
          fi
          echo "putige.pages.dev 已可访问"

      - name: Configure Pages plain environment variables
        continue-on-error: true
        run: |
          patch='{"deployment_configs":{"production":{"env_vars":{'
          patch+='"DEEPSEEK_BASE_URL":{"type":"plain_text","value":"https://api.deepseek.com"},'
          patch+='"DEEPSEEK_MODEL":{"type":"plain_text","value":"deepseek-chat"},'
          patch+='"NEXT_PUBLIC_BASE_URL":{"type":"plain_text","value":"https://putige.pages.dev"},'
          patch+='"PAYMENT_MODE":{"type":"plain_text","value":"demo"}'
          patch+='}}}}'
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$patch" | tee /tmp/cf-pages-env.json
          grep -q '"success":true' /tmp/cf-pages-env.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (backup URL)
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Worker runtime secret
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler secret put DEEPSEEK_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deployment info
        if: success()
        run: |
          echo "部署完成！"
          echo "  主站: https://putige.pages.dev"
          echo "  备用: https://putige-worker.wangboyi1314.workers.dev"
