name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_ACCOUNT_ID（填 70ebb96ad3d3a7c5e308a26ac50862dc）"
            missing=1
          fi
          if [ -z "${DEEPSEEK_KEY}" ]; then
            echo "::error::未配置 GitHub Secret: DEEPSEEK_API_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Secrets 已配置（Token 长度 ${#CF_TOKEN} 字符）"

      - name: Install dependencies
        run: npm ci

      - name: Verify Node.js version
        run: |
          node -v
          major=$(node -p "process.versions.node.split('.')[0]")
          if [ "$major" -lt 22 ]; then
            echo "::error::Wrangler 需要 Node.js 22+，当前为 $(node -v)。请确认 .node-version 为 22。"
            exit 1
          fi

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
          NEXT_PUBLIC_BASE_URL: https://putige.pages.dev
          PAYMENT_MODE: demo

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload runtime secret
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler secret put DEEPSEEK_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deployment info
        if: success()
        run: |
          echo "部署完成。请访问："
          echo "  https://putige.wangboyi1314.workers.dev"
          echo "  或（若已配置 Pages）https://putige.pages.dev"
