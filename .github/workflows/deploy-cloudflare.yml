name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XUNHU_SECRET: ${{ secrets.XUNHU_APP_SECRET }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then
            echo "::error::未配置 CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT}" ]; then
            echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${DEEPSEEK_KEY}" ]; then
            echo "::error::未配置 DEEPSEEK_API_KEY"
            missing=1
          fi
          if [ -z "${XUNHU_SECRET}" ]; then
            echo "::warning::未配置 XUNHU_APP_SECRET，支付下单将失败；请在 GitHub Secrets 添加虎皮椒密钥"
          fi
          [ "$missing" -eq 0 ]

      - name: Install dependencies
        run: npm ci

      - name: Build static site (like putiyuan)
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEXT_PUBLIC_BASE_URL: https://putige-eh2.pages.dev
          PAYMENT_MODE: xunhu

      - name: Package Pages bundle with Functions
        run: bash scripts/build-pages-static.sh

      - name: Compile Pages Functions
        run: npx wrangler pages functions build out --compatibility-flag nodejs_compat

      - name: Ensure Pages project exists
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          GET=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$GET" | tee /tmp/get-pages.json
          if echo "$GET" | grep -q '"success":true'; then
            echo "Pages 项目 putige 已存在"
            exit 0
          fi
          CREATE=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "putige",
              "production_branch": "main",
              "deployment_configs": {
                "production": {
                  "compatibility_date": "2026-06-25",
                  "compatibility_flags": ["nodejs_compat", "global_fetch_strictly_public"]
                }
              }
            }')
          echo "$CREATE" | tee /tmp/create-pages.json
          if echo "$CREATE" | grep -q '"success":true'; then
            echo "已创建 Pages 项目 putige"
          else
            echo "::warning::创建 Pages 项目失败，继续尝试 deploy（可能已存在）"
          fi

      - name: Ensure orders KV namespace
        id: kv
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          LIST=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          KV_ID=$(echo "$LIST" | grep -o '"id":"[^"]*","title":"putige-orders"' | head -1 | cut -d'"' -f4 || true)
          if [ -z "$KV_ID" ]; then
            KV_ID=$(echo "$LIST" | python3 -c "
import json,sys
data=json.load(sys.stdin)
for ns in data.get('result',[]):
  if ns.get('title')=='putige-orders':
    print(ns['id']); break
" 2>/dev/null || true)
          fi
          if [ -z "$KV_ID" ]; then
            CREATE=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"title":"putige-orders"}')
            KV_ID=$(echo "$CREATE" | python3 -c "import json,sys; print(json.load(sys.stdin)['result']['id'])" 2>/dev/null || \
              echo "$CREATE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          fi
          if [ -z "$KV_ID" ]; then
            echo "::warning::无法创建 KV 命名空间 putige-orders，订单将仅用内存（多实例可能轮询失败）"
            echo "kv_id=" >> "$GITHUB_OUTPUT"
          else
            echo "KV namespace putige-orders: $KV_ID"
            echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XUNHU_APP_SECRET: ${{ secrets.XUNHU_APP_SECRET }}
          KV_ID: ${{ steps.kv.outputs.kv_id }}
        run: |
          set -euo pipefail
          echo "$DEEPSEEK_API_KEY" | npx wrangler pages secret put DEEPSEEK_API_KEY --project-name putige
          if [ -n "${XUNHU_APP_SECRET}" ]; then
            echo "$XUNHU_APP_SECRET" | npx wrangler pages secret put XUNHU_APP_SECRET --project-name putige
          else
            echo "::warning::跳过 XUNHU_APP_SECRET（未配置 GitHub Secret）"
          fi

          KV_JSON=""
          if [ -n "${KV_ID}" ]; then
            KV_JSON=",\"kv_namespaces\":{\"ORDERS\":{\"namespace_id\":\"${KV_ID}\"}}"
          fi

          PATCH_BODY="{
            \"production_branch\": \"main\",
            \"deployment_configs\": {
              \"production\": {
                \"compatibility_date\": \"2026-06-25\",
                \"compatibility_flags\": [\"nodejs_compat\", \"global_fetch_strictly_public\"],
                \"env_vars\": {
                  \"DEEPSEEK_BASE_URL\": {\"type\":\"plain_text\",\"value\":\"https://api.deepseek.com\"},
                  \"DEEPSEEK_MODEL\": {\"type\":\"plain_text\",\"value\":\"deepseek-chat\"},
                  \"NEXT_PUBLIC_BASE_URL\": {\"type\":\"plain_text\",\"value\":\"https://putige-eh2.pages.dev\"},
                  \"PAYMENT_MODE\": {\"type\":\"plain_text\",\"value\":\"xunhu\"},
                  \"XUNHU_APP_ID\": {\"type\":\"plain_text\",\"value\":\"20211120137\"}
                }${KV_JSON}
              }
            }
          }"

          RESP=$(curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PATCH_BODY")
          echo "$RESP" | tee /tmp/pages-env.json
          if echo "$RESP" | grep -q '"success":true'; then
            echo "已设置 PAYMENT_MODE=xunhu, XUNHU_APP_ID=20211120137"
          else
            echo "::warning::Pages 环境变量 PATCH 未确认成功，继续部署（wrangler.jsonc vars 会注入）"
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=putige --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"

      - name: Verify Pages deployment
        id: verify
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          CANONICAL="https://putige-eh2.pages.dev"

          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-project.json

          SUB=$(python3 -c "
          import json
          with open('/tmp/pages-project.json') as f:
              r = json.load(f).get('result') or {}
          print(r.get('subdomain', ''))
          " 2>/dev/null || true)

          DEPLOY_URL=$(curl -sS \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige/deployments?env=production&per_page=1" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | python3 -c "
          import json, sys
          items = (json.load(sys.stdin).get('result') or [])
          if not items:
              sys.exit(0)
          d = items[0]
          aliases = d.get('aliases') or []
          if aliases:
              a = aliases[0]
              print(a if a.startswith('http') else 'https://' + a)
          elif d.get('url'):
              print(d['url'])
          " 2>/dev/null || true)

          URLS=()
          add_url() {
            local u="$1"
            [ -z "$u" ] && return
            case " ${URLS[*]} " in *" $u "*) return ;; esac
            URLS+=("$u")
          }

          add_url "$CANONICAL"
          add_url "$DEPLOY_URL"
          if [ -n "$SUB" ]; then
            if echo "$SUB" | grep -q '\.pages\.dev$'; then
              add_url "https://${SUB}"
            else
              add_url "https://${SUB}.pages.dev"
            fi
          fi

          echo "待验证地址: ${URLS[*]}"
          echo "pages_url=${CANONICAL}" >> "$GITHUB_OUTPUT"

          for url in "${URLS[@]}"; do
            for i in 1 2 3 4 5 6; do
              code=$(curl -sS -o /tmp/body.html -w "%{http_code}" -L "$url" || echo "000")
              echo "$url => HTTP $code"
              if [ "$code" = "200" ]; then
                echo "verified_url=$url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              sleep 15
            done
          done
          echo "::error::Pages 未返回 HTTP 200（已尝试: ${URLS[*]}）"
          exit 1

      - name: Verify payment API mode
        continue-on-error: true
        env:
          CANONICAL: https://putige-eh2.pages.dev
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -sS -X POST "${CANONICAL}/api/payment/create" \
              -H "Content-Type: application/json" \
              -d '{"productId":"qian_premium","payChannel":"wechat"}' || echo "{}")
            echo "payment/create => $BODY"
            if echo "$BODY" | grep -q '"xunhuMode":true'; then
              echo "虎皮椒支付模式已生效"
              exit 0
            fi
            if echo "$BODY" | grep -q '"demoMode":true'; then
              echo "仍为演示模式，等待环境变量生效..."
            fi
            sleep 15
          done
          echo "::error::支付 API 仍为演示模式或下单失败，请检查 PAYMENT_MODE 与 XUNHU_APP_SECRET"
          exit 1

      - name: Deployment info
        if: always() && !cancelled()
        run: |
          echo "部署完成"
          echo "  部署步骤: ${{ steps.deploy.outcome || 'unknown' }}"
          echo "  主站: ${{ steps.verify.outputs.verified_url || steps.verify.outputs.pages_url || 'https://putige-eh2.pages.dev' }}"
          echo "  支付测试: curl -X POST https://putige-eh2.pages.dev/api/payment/create -H 'Content-Type: application/json' -d '{\"productId\":\"qian_premium\"}'"
