name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${DEEPSEEK_KEY}" ]; then
            echo "::error::未配置 GitHub Secret: DEEPSEEK_API_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Verify Node.js version
        run: |
          major=$(node -p "process.versions.node.split('.')[0]")
          if [ "$major" -lt 22 ]; then
            echo "::error::Wrangler 需要 Node.js 22+"
            exit 1
          fi

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
          NEXT_PUBLIC_BASE_URL: https://putige.wangboyi1314.workers.dev
          PAYMENT_MODE: demo

      - name: Populate remote cache
        run: npx opennextjs-cloudflare populateCache remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (OpenNext)
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Worker runtime secret
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler secret put DEEPSEEK_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Verify Worker deployment
        id: verify_worker
        run: |
          set -euo pipefail
          URL="https://putige.wangboyi1314.workers.dev"
          for i in 1 2 3 4 5 6; do
            echo "=== HTTP 检查 (${i}/6) ${URL} ==="
            code=$(curl -sS -o /tmp/worker-body.html -w "%{http_code}" "$URL" || echo "000")
            echo "HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Worker 已可访问"
              exit 0
            fi
            if [ "$i" -lt 6 ]; then
              sleep 20
            fi
          done
          echo "::error::Worker 未返回 HTTP 200"
          exit 1

      - name: Check Pages subdomain (informational)
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" || echo '{}')
          echo "$RESP" | tee /tmp/pages-info.json
          SUB=$(echo "$RESP" | grep -o '"subdomain":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
          if [ -n "$SUB" ]; then
            echo "Pages 子域: https://${SUB}.pages.dev"
            code=$(curl -sS -o /dev/null -w "%{http_code}" "https://${SUB}.pages.dev" || echo "000")
            echo "Pages HTTP $code"
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" https://putige.pages.dev || echo "000")
          echo "putige.pages.dev HTTP $code（若 404 表示该子域未绑定到当前 Pages 项目）"

      - name: Deployment info
        if: always() && !cancelled()
        run: |
          echo "部署完成"
          echo "  主站（OpenNext 官方）: https://putige.wangboyi1314.workers.dev"
          if [ "${{ steps.verify_worker.outcome }}" = "success" ]; then
            echo "  Worker 验证通过"
          else
            echo "::warning::Worker 验证未通过，请查看上方日志"
          fi
          echo ""
          echo "说明：OpenNext 只支持 Workers，不支持 Pages 直传。"
          echo "putige.pages.dev 若仍 404，请在控制台删除旧 Pages 项目后重建，或绑定自有域名。"
