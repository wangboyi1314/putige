name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then echo "::error::未配置 CLOUDFLARE_API_TOKEN"; missing=1; fi
          if [ -z "${CF_ACCOUNT}" ]; then echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID"; missing=1; fi
          if [ -z "${DEEPSEEK_KEY}" ]; then echo "::error::未配置 DEEPSEEK_API_KEY"; missing=1; fi
          [ "$missing" -eq 0 ]

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEXT_PUBLIC_BASE_URL: https://putige-eh2.pages.dev
          PAYMENT_MODE: xunhu
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ secrets.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}

      - name: Package Pages bundle with Functions
        run: |
          bash scripts/build-pages-static.sh
          echo "${{ github.sha }}" > out/build-id.txt

      - name: Compile Pages Functions
        run: npx wrangler pages functions build out --compatibility-flag nodejs_compat

      - name: Ensure orders KV namespace
        id: orders_kv
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces"
          KV_ID=$(curl -sS "$API" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r '.result[] | select(.title=="putige-orders") | .id' | head -1)
          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            KV_ID=$(curl -sS -X POST "$API" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"title":"putige-orders"}' \
              | jq -r '.result.id')
            echo "Created KV namespace putige-orders"
          else
            echo "Using existing KV namespace putige-orders"
          fi
          test -n "$KV_ID"
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"

      - name: Bind ORDERS KV to Pages project
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_ID: ${{ steps.orders_kv.outputs.kv_id }}
        run: |
          set -euo pipefail
          BODY=$(jq -n --arg id "$KV_ID" '{
            deployment_configs: {
              production: { kv_namespaces: { ORDERS: { namespace_id: $id } } },
              preview: { kv_namespaces: { ORDERS: { namespace_id: $id } } }
            }
          }')
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$BODY" | jq -e '.success' >/dev/null
          echo "Bound ORDERS KV namespace to putige Pages project"

      - name: Configure Pages secrets
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          XUNHU_APP_SECRET: ${{ secrets.XUNHU_APP_SECRET }}
        run: |
          echo "$DEEPSEEK_API_KEY" | npx wrangler pages secret put DEEPSEEK_API_KEY --project-name putige
          if [ -n "${XUNHU_APP_SECRET}" ]; then
            echo "$XUNHU_APP_SECRET" | npx wrangler pages secret put XUNHU_APP_SECRET --project-name putige
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler pages deploy out \
            --project-name=putige \
            --branch=main \
            --commit-hash="${{ github.sha }}"

      - name: Verify payment API
        continue-on-error: true
        run: |
          set -euo pipefail
          BASE="https://putige-eh2.pages.dev"
          for i in 1 2 3 4 5 6 7 8; do
            HEALTH=$(curl -sS "$BASE/api/health" || echo "{}")
            echo "health attempt $i => $HEALTH"
            BODY=$(curl -sS -X POST "$BASE/api/payment/create" \
              -H "Content-Type: application/json" \
              -d '{"productId":"qian_premium","payChannel":"wechat"}' || echo "{}")
            echo "create attempt $i => $BODY"
            ORDER_ID=$(echo "$BODY" | jq -r '.orderId // empty')
            if echo "$BODY" | grep -q '"xunhuMode":true' && [ -n "$ORDER_ID" ]; then
              STATUS=$(curl -sS "$BASE/api/payment/status?orderId=$ORDER_ID" || echo "{}")
              echo "status => $STATUS"
              if echo "$STATUS" | grep -q '"paid":false' || echo "$STATUS" | grep -q '"status":"pending"'; then
                echo "虎皮椒支付已上线（状态轮询走虎皮椒查询接口）"
                exit 0
              fi
              echo "::warning::支付下单成功但状态接口异常"
            fi
            sleep 15
          done
          echo "::error::支付 API 未完全就绪，请检查 Cloudflare 环境变量与 KV"
          exit 1

      - name: Verify miniprogram API
        continue-on-error: true
        env:
          CANONICAL: https://putige-eh2.pages.dev
        run: |
          set -euo pipefail
          BODY=$(curl -sS "${CANONICAL}/api/mp/health" \
            -H "X-Bodhi-Platform: miniprogram" || echo "{}")
          echo "mp/health => $BODY"
          echo "$BODY" | grep -q '"platform":"miniprogram"' || echo "::warning::小程序 API 未就绪"
          INTERP=$(curl -sS -X POST "${CANONICAL}/api/mp/interpret" \
            -H "Content-Type: application/json" \
            -H "X-Bodhi-Platform: miniprogram" \
            -H "X-Bodhi-Client: ci_smoke_test" \
            -d '{"type":"qian","isPremium":false,"masterId":"huiming","data":{"number":1,"level":"上吉","poem":"测试","story":"测试","meaning":"测试","signType":"关帝灵签"}}' || echo "{}")
          echo "mp/interpret => ${INTERP:0:200}"

      - name: Deployment info
        if: always() && !cancelled()
        run: |
          echo "主站: https://putige-eh2.pages.dev"
          echo "部署: ${{ steps.deploy.outcome }}"
