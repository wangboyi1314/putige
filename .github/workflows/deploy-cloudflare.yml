name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then
            echo "::error::未配置 CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT}" ]; then
            echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${DEEPSEEK_KEY}" ]; then
            echo "::error::未配置 DEEPSEEK_API_KEY"
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - name: Install dependencies
        run: npm ci

      - name: Build static site (like putiyuan)
        run: npm run build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEXT_PUBLIC_BASE_URL: https://putige.pages.dev
          PAYMENT_MODE: demo

      - name: Package Pages bundle with Functions
        run: bash scripts/build-pages-static.sh

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          GET=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$GET" | tee /tmp/get-pages.json
          if echo "$GET" | grep -q '"success":true'; then
            echo "Pages 项目 putige 已存在"
            exit 0
          fi
          curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "putige",
              "production_branch": "main",
              "deployment_configs": {
                "production": {
                  "compatibility_date": "2026-06-25",
                  "compatibility_flags": ["nodejs_compat", "global_fetch_strictly_public"]
                }
              }
            }' | tee /tmp/create-pages.json
          grep -q '"success":true' /tmp/create-pages.json

      - name: Configure Pages secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "$DEEPSEEK_API_KEY" | npx wrangler pages secret put DEEPSEEK_API_KEY --project-name putige
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "production_branch": "main",
              "deployment_configs": {
                "production": {
                  "compatibility_date": "2026-06-25",
                  "compatibility_flags": ["nodejs_compat", "global_fetch_strictly_public"],
                  "env_vars": {
                    "DEEPSEEK_BASE_URL": {"type":"plain_text","value":"https://api.deepseek.com"},
                    "DEEPSEEK_MODEL": {"type":"plain_text","value":"deepseek-chat"},
                    "NEXT_PUBLIC_BASE_URL": {"type":"plain_text","value":"https://putige.pages.dev"},
                    "PAYMENT_MODE": {"type":"plain_text","value":"demo"}
                  }
                }
              }
            }' | tee /tmp/pages-env.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=putige --branch=main --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"

      - name: Verify Pages deployment
        id: verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-project.json
          SUB=$(grep -o '"subdomain":"[^"]*"' /tmp/pages-project.json | head -1 | cut -d'"' -f4 || true)
          if [ -z "$SUB" ]; then SUB="putige"; fi
          PRIMARY="https://${SUB}.pages.dev"
          echo "pages_url=${PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "Pages 地址: ${PRIMARY}"
          for url in "$PRIMARY" "https://putige.pages.dev"; do
            for i in 1 2 3 4 5 6; do
              code=$(curl -sS -o /tmp/body.html -w "%{http_code}" "$url" || echo "000")
              echo "$url => HTTP $code"
              if [ "$code" = "200" ]; then
                echo "verified_url=$url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              sleep 15
            done
          done
          echo "::error::Pages 未返回 HTTP 200"
          exit 1

      - name: Deployment info
        if: always() && !cancelled()
        run: |
          echo "部署完成"
          echo "  主站: ${{ steps.verify.outputs.verified_url || steps.verify.outputs.pages_url || 'https://putige.pages.dev' }}"
