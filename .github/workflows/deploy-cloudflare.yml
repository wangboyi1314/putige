name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Check required secrets
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${CF_TOKEN}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${CF_ACCOUNT}" ]; then
            echo "::error::未配置 GitHub Secret: CLOUDFLARE_ACCOUNT_ID（填 70ebb96ad3d3a7c5e308a26ac50862dc）"
            missing=1
          fi
          if [ -z "${DEEPSEEK_KEY}" ]; then
            echo "::error::未配置 GitHub Secret: DEEPSEEK_API_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Secrets 已配置（Token 长度 ${#CF_TOKEN} 字符）"

      - name: Install dependencies
        run: npm ci

      - name: Verify Node.js version
        run: |
          node -v
          major=$(node -p "process.versions.node.split('.')[0]")
          if [ "$major" -lt 22 ]; then
            echo "::error::Wrangler 需要 Node.js 22+，当前为 $(node -v)。请确认 .node-version 为 22。"
            exit 1
          fi

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
          NEXT_PUBLIC_BASE_URL: https://putige.pages.dev
          PAYMENT_MODE: demo

      - name: Diagnose Cloudflare project conflict
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          echo "=== Pages 项目 putige ==="
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-project.json
          echo ""
          echo "=== Workers 脚本（检查是否仍有 putige 占用名称）==="
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/workers-scripts.json
          if grep -q '"id":"putige"' /tmp/workers-scripts.json 2>/dev/null; then
            echo "::warning::仍存在 Worker 脚本 putige，可能与 Pages 项目 putige 冲突"
          fi

      - name: Remove conflicting Worker putige
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if grep -q '"id":"putige"' /tmp/workers-scripts.json 2>/dev/null; then
            echo "正在删除冲突的 Worker putige（释放 putige.pages.dev）..."
            npx wrangler delete putige --force
            echo "已删除 Worker putige"
          else
            echo "无冲突 Worker putige，跳过删除"
          fi

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          GET=$(curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$GET" | tee /tmp/get-pages.json
          if echo "$GET" | grep -q '"success":true'; then
            echo "Pages 项目 putige 已存在"
            if echo "$GET" | grep -q '"type":"github"'; then
              echo "检测到 Git 集成，关闭自动构建以免与 Actions 冲突..."
              PATCH=$(curl -sS -X PATCH "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "production_branch": "main",
                  "source": {
                    "type": "github",
                    "config": {
                      "deployments_enabled": false,
                      "production_deployments_enabled": false,
                      "preview_deployment_setting": "none"
                    }
                  }
                }')
            else
              PATCH=$(curl -sS -X PATCH "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"production_branch":"main"}')
            fi
            echo "$PATCH" | tee /tmp/patch-pages.json
            exit 0
          fi
          echo "Pages 项目 putige 不存在，正在创建..."
          CREATE=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "putige",
              "production_branch": "main",
              "deployment_configs": {
                "production": {
                  "compatibility_date": "2026-06-25",
                  "compatibility_flags": ["nodejs_compat_v2", "global_fetch_strictly_public"]
                }
              }
            }')
          echo "$CREATE" | tee /tmp/create-pages.json
          if echo "$CREATE" | grep -q '"success":true'; then
            echo "已通过 API 创建 Pages 项目 putige"
          elif echo "$CREATE" | grep -qi 'already exists\|800000\|duplicate\|already been taken'; then
            echo "Pages 项目 putige 名称已被占用（可能为旧 Workers 项目），继续尝试部署..."
          else
            echo "::warning::API 创建 Pages 失败，尝试 wrangler..."
            npx wrangler pages project create putige \
              --production-branch main \
              --compatibility-date 2026-06-25 \
              --compatibility-flag nodejs_compat_v2 \
              --compatibility-flag global_fetch_strictly_public \
              || echo "wrangler create 也失败，继续 deploy（可能项目已存在）"
          fi

      - name: Configure Pages secrets (before deploy)
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler pages secret put DEEPSEEK_API_KEY --project-name putige
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Prepare Pages deploy bundle
        run: bash scripts/prepare-pages-bundle.sh

      - name: Deploy to Cloudflare Pages (putige.pages.dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next/assets --project-name=putige --branch=main --commit-hash=${{ github.sha }} --commit-message="Deploy ${{ github.sha }}"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"

      - name: Confirm Pages production deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-project-after.json
          echo ""
          curl -sS "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige/deployments?per_page=5" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | tee /tmp/pages-deployments.json
          if grep -q '"canonical_deployment":null' /tmp/pages-project-after.json; then
            echo "::warning::尚无 canonical_deployment（生产部署），putige.pages.dev 可能仍为 404"
          fi
          if ! grep -q '"environment":"production"' /tmp/pages-deployments.json; then
            echo "::warning::最近部署列表中未见 production 环境，请检查生产分支是否为 main"
          fi

      - name: Verify Pages deployment
        continue-on-error: true
        id: verify_pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            echo "=== HTTP 检查 (${i}/6) ==="
            curl -sI https://putige.pages.dev | head -10 | tee /tmp/pages-http.txt
            if ! grep -q "404" /tmp/pages-http.txt; then
              echo "putige.pages.dev 已可访问"
              exit 0
            fi
            if [ "$i" -lt 6 ]; then
              echo "仍 404，等待 30 秒后重试..."
              sleep 30
            fi
          done
          echo "::warning::putige.pages.dev 仍返回 404，继续部署 Worker 备用地址"
          echo "::warning::请在 Cloudflare 控制台确认：Pages 项目 putige 存在，且已暂停 Git 自动构建"
          echo "::warning::详见 CLOUDFLARE_PAGES_FIX.md"
          exit 1

      - name: Configure Pages plain environment variables
        continue-on-error: true
        run: |
          patch='{"deployment_configs":{"production":{"env_vars":{'
          patch+='"DEEPSEEK_BASE_URL":{"type":"plain_text","value":"https://api.deepseek.com"},'
          patch+='"DEEPSEEK_MODEL":{"type":"plain_text","value":"deepseek-chat"},'
          patch+='"NEXT_PUBLIC_BASE_URL":{"type":"plain_text","value":"https://putige.pages.dev"},'
          patch+='"PAYMENT_MODE":{"type":"plain_text","value":"demo"}'
          patch+='}}}}'
          curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/putige" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$patch" | tee /tmp/cf-pages-env.json
          grep -q '"success":true' /tmp/cf-pages-env.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (backup URL)
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Worker runtime secret
        run: echo "$DEEPSEEK_API_KEY" | npx wrangler secret put DEEPSEEK_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Deployment info
        if: success()
        run: |
          echo "部署完成！"
          echo "  主站: https://putige.pages.dev"
          echo "  备用: https://putige-worker.wangboyi1314.workers.dev"
          if [ "${{ steps.verify_pages.outcome }}" != "success" ]; then
            echo "::warning::Pages 主站验证未通过，请先用备用地址或按 CLOUDFLARE_PAGES_FIX.md 处理"
          fi
